<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curvas de Mercado — Bonos</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --panel:   #080808;
      --border:  #1c1c1c;
      --border2: #2a2a2a;
      --txt1:    #ffffff;
      --txt2:    #999999;
      --txt3:    #444444;
      --blue:    #1a4cc8;
      --pink:    #e32d91;
      --purple:  #7030a0;
      --navy:    #000099;
      --blue2:   #1155cc;
    }

    body {
      background: var(--bg); color: var(--txt1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg);
    }
    .logo-wrap { display: flex; align-items: center; gap: 16px; }
    .logo-svg { height: 36px; width: auto; }
    .hdr-divider { width: 1px; height: 28px; background: var(--border2); }
    .subtitle { font-size: 11px; color: var(--txt2); }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .last-update { font-size: 11px; color: var(--txt3); }
    .refresh-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      border-radius: 4px; border: 1px solid var(--border2); background: var(--panel);
      color: var(--txt2); font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .refresh-btn:hover { border-color: var(--blue); color: var(--txt1); }
    .refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn.spinning .ri { display: inline-block; animation: spin .7s linear infinite; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    .panel-head { padding: 10px 10px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel-title {
      font-size: 10px; font-weight: 700; color: var(--txt3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px;
    }

    .legend { display: flex; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
    .legend-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
      border: 1px solid; cursor: pointer; user-select: none; transition: opacity .15s;
    }
    .legend-chip.off { opacity: .3; }
    .legend-chip .chip-circle { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid; }

    .panel-actions { display: flex; gap: 4px; margin-bottom: 7px; }
    .small-btn {
      flex: 1; padding: 4px 0; border-radius: 3px; font-size: 11px;
      border: 1px solid var(--border2); background: var(--bg); color: var(--txt2); cursor: pointer;
      transition: all .12s;
    }
    .small-btn:hover { border-color: var(--blue); color: var(--txt1); }
    .bond-search {
      width: 100%; padding: 5px 7px; border-radius: 3px;
      border: 1px solid var(--border2); background: var(--bg);
      color: var(--txt1); font-size: 11px; outline: none;
    }
    .bond-search::placeholder { color: var(--txt3); }
    .bond-search:focus { border-color: var(--blue); }

    .tbl-head {
      display: flex; align-items: center; padding: 5px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; background: #0a0a0a;
      font-size: 10px; font-weight: 700; color: var(--txt3);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .th-chk  { width: 20px; flex-shrink: 0; }
    .th-src  { width: 26px; flex-shrink: 0; }
    .th-bond { flex: 1; }
    .th-mcd  { width: 44px; flex-shrink: 0; text-align: right; }
    .th-met  { width: 50px; flex-shrink: 0; text-align: right; padding-right: 2px; }

    .bond-list { flex: 1; overflow-y: auto; }
    .bond-list::-webkit-scrollbar { width: 4px; }
    .bond-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .bond-row {
      display: flex; align-items: center; padding: 4px 10px;
      font-size: 11px; cursor: pointer; border-bottom: 1px solid #0f0f0f;
      transition: background .1s;
    }
    .bond-row:hover { background: #111111; }
    .bond-row.active  { color: var(--txt1); }
    .bond-row.inactive { color: var(--txt3); }
    .bond-row input[type=checkbox] { width: 20px; flex-shrink: 0; accent-color: var(--blue); cursor: pointer; }
    .src-badge {
      width: 26px; flex-shrink: 0; font-size: 9px; font-weight: 700;
      text-align: center; padding: 1px 3px; border-radius: 2px; letter-spacing: .02em;
    }
    .bond-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bond-mcd  { width: 44px; flex-shrink: 0; text-align: right; color: var(--txt2); font-variant-numeric: tabular-nums; }
    .bond-met  { width: 50px; flex-shrink: 0; text-align: right; padding-right: 2px; font-variant-numeric: tabular-nums; }

    .bond-count { padding: 5px 10px; font-size: 10px; color: var(--txt3); border-top: 1px solid var(--border); flex-shrink: 0; }

    /* ── Quad grid ── */
    .quad-grid {
      flex: 1; display: grid;
      grid-template-columns: 210px 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 1px; background: var(--border);
      overflow: hidden;
    }
    .quadrant {
      background: var(--bg); display: flex; flex-direction: column;
      overflow: hidden; position: relative; min-height: 0;
    }
    .q-head {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap; background: #050505;
    }
    .q-title {
      font-size: 10px; font-weight: 700; color: var(--txt3);
      text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; white-space: nowrap;
    }
    .q-divider { width: 1px; height: 14px; background: var(--border2); flex-shrink: 0; }
    .q-empty { align-items: center; justify-content: center; background: #030303; }
    .q-empty-text { font-size: 11px; color: #1e1e1e; letter-spacing: .05em; text-transform: uppercase; }
    .fwds-select {
      padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--border2); background: var(--panel);
      color: var(--txt1); cursor: pointer; outline: none;
    }
    .fwds-select:focus { border-color: var(--pink); }

    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-group { display: flex; gap: 4px; }
    .btn {
      padding: 5px 13px; border-radius: 3px; border: 1px solid var(--border2);
      background: var(--panel); color: var(--txt2); font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all .12s;
    }
    .btn:hover { border-color: var(--blue); color: var(--txt1); }
    .btn.on-TEM { background:#3a0820; border-color:var(--pink);   color:var(--pink);   }
    .btn.on-TNA { background:#0d1e4a; border-color:var(--blue);   color:var(--blue);   }
    .btn.on-CER { background:#200a2e; border-color:var(--purple); color:var(--purple); }
    .btn.on-USD { background:#00003a; border-color:var(--navy);   color:#4466cc;       }

    .right-opts { display: flex; align-items: center; gap: 12px; }
    .tog-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--txt2); cursor: pointer; user-select: none; }
    .tog-label input { accent-color: var(--blue); cursor: pointer; }

    .axis-bar { display: flex; align-items: center; gap: 14px; flex-shrink: 0; flex-wrap: wrap; }
    .axis-group { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--txt2); }
    .axis-lbl { font-size: 10px; font-weight: 700; color: var(--txt3); text-transform: uppercase; letter-spacing: .05em; }
    .axis-input {
      width: 58px; padding: 3px 6px; border-radius: 3px;
      border: 1px solid var(--border2); background: var(--panel);
      color: var(--txt1); font-size: 11px; text-align: center; outline: none;
    }
    .axis-input:focus { border-color: var(--blue); }
    .axis-sep { color: var(--txt3); font-size: 10px; }
    .reset-axes {
      padding: 3px 9px; border-radius: 3px; font-size: 11px;
      border: 1px solid var(--border2); background: var(--panel); color: var(--txt2); cursor: pointer;
      transition: all .12s;
    }
    .reset-axes:hover { border-color: var(--pink); color: var(--txt1); }

    .canvas-wrap { flex: 1; position: relative; min-height: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: var(--bg); z-index: 10; }
    .overlay.hidden { display: none; }
    .spinner { width: 22px; height: 22px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; }
    .overlay-text { font-size: 13px; color: var(--txt2); }
    .error-box { background: #100008; border: 1px solid var(--pink); border-radius: 4px; padding: 14px 18px; color: var(--pink); font-size: 12px; max-width: 360px; text-align: center; line-height: 1.7; }

    #tip { position: fixed; pointer-events: none; z-index: 200; background: #111; border: 1px solid var(--border2); border-radius: 4px; padding: 7px 10px; font-size: 11px; color: var(--txt1); display: none; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <!-- Logo one618 Asset Management -->
    <svg class="logo-svg" viewBox="0 0 210 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="30" font-family="'Montserrat',sans-serif"
            font-size="31" font-weight="700" fill="#ffffff" letter-spacing="-0.5">one618</text>
      <text x="1" y="41" font-family="'Montserrat',sans-serif"
            font-size="8" font-weight="400" fill="#999999" letter-spacing="3.5">ASSET MANAGEMENT</text>
    </svg>
    <div class="hdr-divider"></div>
    <div class="subtitle" id="subtitle">Cargando…</div>
  </div>
  <div class="hdr-right">
    <span class="last-update" id="lastUpdate"></span>
    <span class="last-update" id="autoRefreshTimer" style="color:#388bfd88"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span class="ri">↻</span> Actualizar
    </button>
  </div>
</header>

<div class="layout">

  <div class="quad-grid">

    <!-- Q1: Panel de bonos ──────────────────────── -->
    <div class="quadrant" style="background:var(--panel);">
      <div class="panel-head">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
          <div class="panel-title" style="margin-bottom:0;">Selección de bonos</div>
          <div class="panel-actions" style="margin-bottom:0; gap:4px;">
            <button class="small-btn" onclick="setAll(true)">Todos</button>
            <button class="small-btn" onclick="setAll(false)">Ninguno</button>
          </div>
        </div>
        <div class="legend" id="legend"></div>
        <input class="bond-search" id="bondSearch" type="text" placeholder="Buscar…" oninput="renderList()">
      </div>
      <div class="tbl-head">
        <div class="th-chk"></div>
        <div class="th-src"></div>
        <div class="th-bond">Bono</div>
        <div class="th-mcd">McD</div>
        <div class="th-met" id="thMetric">TEM%</div>
      </div>
      <div class="bond-list" id="bondList"></div>
      <div class="bond-count" id="bondCount"></div>
    </div>

    <!-- Q2: Curvas de Rendimiento ──────────────── -->
    <div class="quadrant">
      <div class="q-head">
        <span class="q-title">Curvas</span>
        <div class="q-divider"></div>
        <div class="controls">
          <div class="btn-group">
            <button class="btn on-TEM" id="btn-TEM" onclick="switchMetric('TEM')">TEM</button>
            <button class="btn" id="btn-TNA" onclick="switchMetric('TNA')">TNA</button>
            <button class="btn" id="btn-CER" onclick="switchMetric('CER')">CER</button>
            <button class="btn" id="btn-USD" onclick="switchMetric('USD')">USD</button>
          </div>
          <label class="tog-label"><input type="checkbox" id="chkLabels" checked onchange="redraw()"> Etiquetas</label>
          <label class="tog-label"><input type="checkbox" id="chkCurve"  checked onchange="redraw()"> Curva</label>
        </div>
      </div>
      <div class="axis-bar" style="padding:4px 10px; border-bottom:1px solid var(--border);">
        <div class="axis-group">
          <span class="axis-lbl">X</span>
          <input class="axis-input" id="axXlo" type="number" step="any" onchange="onAxisChange()">
          <span class="axis-sep">—</span>
          <input class="axis-input" id="axXhi" type="number" step="any" onchange="onAxisChange()">
        </div>
        <div class="axis-group">
          <span class="axis-lbl">Y</span>
          <input class="axis-input" id="axYlo" type="number" step="any" onchange="onAxisChange()">
          <span class="axis-sep">—</span>
          <input class="axis-input" id="axYhi" type="number" step="any" onchange="onAxisChange()">
        </div>
        <button class="reset-axes" onclick="resetAxes()">↺</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="overlay" id="overlay">
          <div class="spinner"></div>
          <div class="overlay-text">Cargando desde Google Sheets…</div>
        </div>
      </div>
    </div>

    <!-- Q3: Forwards ───────────────────────────── -->
    <div class="quadrant">
      <div class="q-head">
        <span class="q-title">Forwards</span>
        <div class="q-divider"></div>
        <select class="fwds-select" id="fwdsSelect" onchange="switchFwds(this.value)">
          <option>Cargando…</option>
        </select>
        <label class="tog-label"><input type="checkbox" id="chkLabels3" checked onchange="redrawFwds()"> Etiquetas</label>
        <label class="tog-label"><input type="checkbox" id="chkCurve3"  checked onchange="redrawFwds()"> Curva</label>
      </div>
      <div class="canvas-wrap" id="q3wrap">
        <canvas id="c3"></canvas>
        <div class="overlay" id="overlayQ3">
          <div class="spinner"></div>
          <div class="overlay-text">Cargando Forwards…</div>
        </div>
      </div>
    </div>


  </div>
</div>

<div id="tip"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG — editá aquí para agregar/modificar sheets
// ══════════════════════════════════════════════════════
const SHEETS = [
  {
    id:    '1mtd9Dh5brapXTRqhEsup51hISI3rYMHq3cKBJjM5bok',
    name:  'Curvas',          // nombre de la pestaña
    range: 'A5:G54',          // rango de datos (incluye fila de encabezado)
    label: 'Curva 1',         // nombre que aparece en la leyenda
    // Índices de columna (0 = primera columna del rango):
    cols: { bond: 1, McD: 2, TEM: 3, TNA: 4, CER: 5, USD: 6 },
    // Función que decide si una fila es dato válido (no encabezado):
    isData: (c, num) => c[1] && c[1].v && String(c[1].v).trim() !== 'Activo' && num(c, 2) !== null,
  },
  {
    id:    'REEMPLAZAR_CON_ID_DEL_SEGUNDO_SHEET',  // ← pegar ID del segundo sheet
    name:  'Curvas',          // ← ajustar nombre de pestaña
    range: 'A5:G54',          // ← ajustar rango si es diferente
    label: 'Curva 2',
    cols: { bond: 1, McD: 2, TEM: 3, TNA: 4, CER: 5, USD: 6 },  // ← ajustar si las columnas difieren
    isData: (c, num) => c[1] && c[1].v && String(c[1].v).trim() !== 'Activo' && num(c, 2) !== null,
  },
];

// Estilos por serie — el COLOR viene de COL[currentM], aquí solo se define forma/línea
const SERIES_STYLE = [
  { dash: [],    hollow: false, label: SHEETS[0].label },
  { dash: [6,3], hollow: true,  label: SHEETS[1].label },
];

// ══════════════════════════════════════════════════════

const METRICS = ['TEM','TNA','CER','USD'];
const COL = {
  TEM: '#e32d91', TNA: '#1a4cc8', CER: '#7030a0', USD: '#1155cc',
};
const YLBL = { TEM:'TEM (%)', TNA:'TNA (%)', CER:'CER (%)', USD:'USD (%)' };

// ── State ──────────────────────────────────────────────
let allData      = [];   // { bond, McD, TEM, TNA, CER, USD, src }
let selected     = {};   // key = `src:bond`
let seriesOn     = SHEETS.map(() => true);  // visibility per series
let currentM     = 'TEM';
let hoverKey     = null; // `src:idx`
let lastPts      = [];
let axisOverride = { xLo: null, xHi: null, yLo: null, yHi: null };
const PAD = { top: 26, right: 145, bottom: 48, left: 62 };

// ── JSONP ──────────────────────────────────────────────
function fetchOne(sheet) {
  return new Promise((resolve, reject) => {
    const cb = 'gviz_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    let s;
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout: ' + sheet.label)); }, 12000);
    window[cb] = json => { cleanup(); resolve({ json, sheet }); };
    function cleanup() { clearTimeout(t); delete window[cb]; s && s.parentNode && s.parentNode.removeChild(s); }
    s = document.createElement('script');
    s.src = 'https://docs.google.com/spreadsheets/d/' + sheet.id
      + '/gviz/tq?tqx=responseHandler:' + cb
      + '&sheet=' + encodeURIComponent(sheet.name)
      + '&range=' + encodeURIComponent(sheet.range) + '&headers=0';
    s.onerror = () => { cleanup(); reject(new Error('Error cargando: ' + sheet.label)); };
    document.head.appendChild(s);
  });
}

// ── Parse one sheet's rows ─────────────────────────────
function parseSheet(json, sheet, srcIdx) {
  const safeNum = (c, i) => {
    if (!c[i] || c[i].v == null || isNaN(c[i].v)) return null;
    return +c[i].v;
  };
  const cl = sheet.cols;
  return json.table.rows
    .filter(row => sheet.isData(row.c || [], safeNum))
    .map(row => {
      const c   = row.c || [];
      const pct = i => { const v = safeNum(c, i); return v !== null ? +(v * 100).toFixed(4) : null; };
      return {
        bond: String(c[cl.bond].v).trim(),
        McD:  safeNum(c, cl.McD),
        TEM:  pct(cl.TEM),
        TNA:  pct(cl.TNA),
        CER:  pct(cl.CER),
        USD:  pct(cl.USD),
        src:  srcIdx,
      };
    });
}

// ── Load all sheets ────────────────────────────────────
async function loadData() {
  showOverlay('loading'); setRefreshing(true);

  // Only fetch sheets whose ID has been configured (not the placeholder)
  const sheetsToFetch = SHEETS
    .map((s, i) => ({ s, i }))
    .filter(({ s }) => !s.id.startsWith('REEMPLAZAR'));

  const results = await Promise.allSettled(sheetsToFetch.map(({ s }) => fetchOne(s)));

  let loaded = [];
  results.forEach((res, ri) => {
    const srcIdx = sheetsToFetch[ri].i;
    if (res.status === 'fulfilled') {
      const { json, sheet } = res.value;
      if (json.status !== 'error') {
        loaded.push(...parseSheet(json, sheet, srcIdx));
      }
    }
  });

  if (!loaded.length) {
    showOverlay('error', 'No se pudieron cargar los datos.<br><small>Verificá que los sheets sean públicos.</small>');
    setRefreshing(false); return;
  }

  loaded.sort((a, b) => a.McD - b.McD);

  const prev = { ...selected };
  selected = {};
  loaded.forEach(d => {
    const k = d.src + ':' + d.bond;
    selected[k] = prev[k] !== false;
  });
  allData = loaded;

  const total = allData.length;
  const srcs  = [...new Set(allData.map(d => d.src))];
  document.getElementById('subtitle').textContent =
    total + ' bonos · ' + srcs.length + ' fuente' + (srcs.length > 1 ? 's' : '') + ' · eje X: McD';
  document.getElementById('lastUpdate').textContent = 'Act: ' + new Date().toLocaleString('es-AR');

  buildLegend();
  renderList();
  resizeCanvas();
  redraw();
  populateInputs(getActivePts());
  showOverlay('hidden');
  setRefreshing(false);
}

// ── Legend ─────────────────────────────────────────────
function buildLegend() {
  const srcs  = [...new Set(allData.map(d => d.src))];
  const color = COL[currentM];
  const el    = document.getElementById('legend');
  el.innerHTML = srcs.map(i => {
    const st   = SERIES_STYLE[i] || SERIES_STYLE[0];
    const on   = seriesOn[i];
    const circleStyle = st.hollow
      ? `border:1.5px solid ${color}; background:transparent;`
      : `background:${color}; border:1.5px solid ${color};`;
    return `<div class="legend-chip ${on ? '' : 'off'}" style="border-color:${color}33; color:${color}"
              onclick="toggleSeries(${i})">
      <span class="chip-circle" style="${circleStyle}"></span>
      ${SHEETS[i].label}
    </div>`;
  }).join('');
}

function toggleSeries(i) {
  seriesOn[i] = !seriesOn[i];
  buildLegend(); renderList(); redraw();
}

// ── Bond list ──────────────────────────────────────────
function renderList() {
  const q  = document.getElementById('bondSearch').value.toLowerCase();
  const el = document.getElementById('bondList');
  const visible = allData.filter(d =>
    seriesOn[d.src] &&
    (d.bond.toLowerCase().includes(q) || SHEETS[d.src].label.toLowerCase().includes(q))
  );

  el.innerHTML = visible.map(d => {
    const k      = d.src + ':' + d.bond;
    const on     = selected[k];
    const color  = COL[currentM];
    const metVal = d[currentM];
    const metStr = metVal !== null ? metVal.toFixed(2) + '%' : '—';
    return `<div class="bond-row ${on ? 'active' : 'inactive'}" onclick="toggleBond('${k}')">
      <input type="checkbox" ${on ? 'checked' : ''} onclick="event.stopPropagation(); toggleBond('${k}')">
      <span class="src-badge" style="background:${color}22; color:${color}">${d.src + 1}</span>
      <span class="bond-name">${d.bond}</span>
      <span class="bond-mcd">${d.McD.toFixed(2)}</span>
      <span class="bond-met">${metStr}</span>
    </div>`;
  }).join('');

  updateCount();
}

// ── Polynomial fit ─────────────────────────────────────
function makePolyFit(xs, ys, deg) {
  const n = xs.length;
  deg = Math.min(deg, n - 1, 3);
  const d = deg + 1;
  const xm = (Math.min(...xs) + Math.max(...xs)) / 2;
  const xr = (Math.max(...xs) - Math.min(...xs)) / 2 || 1;
  const norm = x => (x - xm) / xr;
  const xn = xs.map(norm);

  const mat = Array.from({length: d}, (_, i) => {
    const row = new Float64Array(d + 1);
    for (let j = 0; j < d; j++) for (let k = 0; k < n; k++) row[j] += Math.pow(xn[k], i + j);
    for (let k = 0; k < n; k++) row[d] += Math.pow(xn[k], i) * ys[k];
    return row;
  });

  for (let i = 0; i < d; i++) {
    let mx = i;
    for (let k = i+1; k < d; k++) if (Math.abs(mat[k][i]) > Math.abs(mat[mx][i])) mx = k;
    [mat[i], mat[mx]] = [mat[mx], mat[i]];
    const piv = mat[i][i];
    if (Math.abs(piv) < 1e-14) continue;
    for (let j = i; j <= d; j++) mat[i][j] /= piv;
    for (let k = 0; k < d; k++) {
      if (k === i) continue;
      const f = mat[k][i];
      if (Math.abs(f) < 1e-15) continue;
      for (let j = i; j <= d; j++) mat[k][j] -= f * mat[i][j];
    }
  }

  const coeffs = mat.map(row => isFinite(row[d]) ? row[d] : 0);
  return x => {
    const xn = norm(x);
    let v = 0;
    for (let i = 0; i < d; i++) v += coeffs[i] * Math.pow(xn, i);
    return isFinite(v) ? v : null;
  };
}

// ── Canvas ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const r   = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width        = Math.floor(r.width  * dpr);
  canvas.height       = Math.floor(r.height * dpr);
  canvas.style.width  = Math.floor(r.width)  + 'px';
  canvas.style.height = Math.floor(r.height) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // todas las coords quedan en puntos lógicos
}

function getActivePts() {
  return allData.filter(d => seriesOn[d.src] && selected[d.src + ':' + d.bond] && d[currentM] !== null);
}

function niceStep(range, target) {
  const rough = range / target;
  const p = Math.pow(10, Math.floor(Math.log10(rough || 1)));
  for (const m of [1, 2, 2.5, 5, 10]) if (p * m >= rough) return p * m;
  return rough;
}

function calcAuto(pts) {
  const xs = pts.map(d => d.McD), ys = pts.map(d => d[currentM]);
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const xp = (xmax-xmin)*.10||.05, yp = (ymax-ymin)*.15||.5;
  return { xLo: xmin-xp, xHi: xmax+xp, yLo: ymin-yp, yHi: ymax+yp };
}

function buildScale(pts) {
  const dpr  = window.devicePixelRatio || 1;
  const lW   = canvas.width  / dpr;   // dimensiones lógicas (CSS pixels)
  const lH   = canvas.height / dpr;
  const auto = calcAuto(pts);
  const xlo = axisOverride.xLo ?? auto.xLo, xhi = axisOverride.xHi ?? auto.xHi;
  const ylo = axisOverride.yLo ?? auto.yLo, yhi = axisOverride.yHi ?? auto.yHi;
  const pW = lW - PAD.left - PAD.right;
  const pH = lH - PAD.top  - PAD.bottom;
  return {
    xlo, xhi, ylo, yhi, pW, pH,
    tx: x => PAD.left + (x-xlo)/(xhi-xlo)*pW,
    ty: y => PAD.top  + pH - (y-ylo)/(yhi-ylo)*pH,
  };
}

function populateInputs(pts) {
  if (!pts.length) return;
  const auto = calcAuto(pts);
  const f = (ovr, v) => ovr !== null ? ovr : v;
  document.getElementById('axXlo').value = f(axisOverride.xLo, auto.xLo).toFixed(2);
  document.getElementById('axXhi').value = f(axisOverride.xHi, auto.xHi).toFixed(2);
  document.getElementById('axYlo').value = f(axisOverride.yLo, auto.yLo).toFixed(2);
  document.getElementById('axYhi').value = f(axisOverride.yHi, auto.yHi).toFixed(2);
}

function onAxisChange() {
  const p = id => { const v = parseFloat(document.getElementById(id).value); return isFinite(v) ? v : null; };
  axisOverride = { xLo: p('axXlo'), xHi: p('axXhi'), yLo: p('axYlo'), yHi: p('axYhi') };
  redraw();
}

function resetAxes() {
  axisOverride = { xLo: null, xHi: null, yLo: null, yHi: null };
  const pts = getActivePts();
  if (pts.length) populateInputs(pts);
  redraw();
}

function redraw() {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.width  / dpr;
  const H   = canvas.height / dpr;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  const pts = getActivePts();
  lastPts   = pts;

  if (!pts.length) {
    ctx.fillStyle = '#444444'; ctx.font = '13px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Sin bonos seleccionados', W/2, H/2);
    return;
  }

  const sc    = buildScale(pts);
  const showL = document.getElementById('chkLabels').checked;
  const showC = document.getElementById('chkCurve').checked;

  // Grid Y
  const yStep  = niceStep(sc.yhi - sc.ylo, 6);
  const yStart = Math.ceil(sc.ylo / yStep) * yStep;
  ctx.setLineDash([]);
  ctx.strokeStyle = '#181818'; ctx.lineWidth = 1;
  ctx.fillStyle = '#666666'; ctx.font = '10px -apple-system,sans-serif';
  for (let y = yStart; y <= sc.yhi + yStep*.01; y = +(y+yStep).toFixed(10)) {
    const py = sc.ty(y);
    ctx.beginPath(); ctx.moveTo(PAD.left, py); ctx.lineTo(PAD.left+sc.pW, py); ctx.stroke();
    ctx.textAlign = 'right';
    ctx.fillText(y.toFixed(2) + '%', PAD.left - 5, py + 3.5);
  }

  // Grid X
  const xStep  = niceStep(sc.xhi - sc.xlo, 7);
  const xStart = Math.ceil(sc.xlo / xStep) * xStep;
  for (let x = xStart; x <= sc.xhi + xStep*.01; x = +(x+xStep).toFixed(10)) {
    const px = sc.tx(x);
    ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, PAD.top+sc.pH); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.fillText(x.toFixed(2), px, PAD.top+sc.pH+15);
  }

  // Axes
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top);
  ctx.lineTo(PAD.left, PAD.top+sc.pH);
  ctx.lineTo(PAD.left+sc.pW, PAD.top+sc.pH);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#666666'; ctx.font = '11px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Modified Duration (McD)', PAD.left+sc.pW/2, H-4);
  ctx.save();
  ctx.translate(12, PAD.top+sc.pH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(YLBL[currentM], 0, 0);
  ctx.restore();

  // Draw per series: curve first, then points on top
  const srcs = [...new Set(pts.map(d => d.src))];

  const metColor = COL[currentM];
  const metFill  = metColor + '55';  // color con 33% opacidad para relleno

  srcs.forEach(si => {
    const sPts = pts.filter(d => d.src === si);
    const st   = SERIES_STYLE[si] || SERIES_STYLE[0];

    // Curve
    if (showC && sPts.length >= 4) {
      const xs   = sPts.map(d => d.McD);
      const ys   = sPts.map(d => d[currentM]);
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      const fn   = makePolyFit(xs, ys, 3);

      ctx.beginPath();
      let pen = false;
      for (let i = 0; i <= 400; i++) {
        const x = xMin + (xMax-xMin)*i/400;
        const y = fn(x);
        if (y === null) { pen = false; continue; }
        const px = sc.tx(x), py = sc.ty(y);
        if (py < PAD.top-2 || py > PAD.top+sc.pH+2) { pen = false; continue; }
        pen ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
        pen = true;
      }
      ctx.setLineDash(st.dash);
      ctx.strokeStyle = metColor;
      ctx.lineWidth   = 2;
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });

  // Points (all series on top of curves)
  pts.forEach((d, i) => {
    const st    = SERIES_STYLE[d.src] || SERIES_STYLE[0];
    const px    = sc.tx(d.McD), py = sc.ty(d[currentM]);
    const hover = hoverKey === d.src + ':' + i;
    const r     = hover ? 7 : 5;

    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
    if (st.hollow) {
      ctx.fillStyle = hover ? metColor + '44' : '#000000';
    } else {
      ctx.fillStyle = hover ? metColor : metFill;
    }
    ctx.fill();
    ctx.strokeStyle = metColor; ctx.lineWidth = hover ? 2 : 1.5; ctx.stroke();
  });

  // Labels
  if (showL) {
    ctx.font = '9px -apple-system,sans-serif'; ctx.fillStyle = '#cccccc';
    pts.forEach((d, i) => {
      if (hoverKey === d.src + ':' + i) return;
      ctx.textAlign = 'left';
      ctx.fillText(d.bond, sc.tx(d.McD)+7, sc.ty(d[currentM])+3.5);
    });
  }
}

// ── Tooltip ────────────────────────────────────────────
const tip = document.getElementById('tip');

canvas.addEventListener('mousemove', e => {
  if (!lastPts.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;   // ya en coordenadas lógicas (CSS px)
  const my   = e.clientY - rect.top;
  const sc   = buildScale(lastPts);

  let best = -1, bestD = 14;
  lastPts.forEach((d, i) => {
    const dx = sc.tx(d.McD)-mx, dy = sc.ty(d[currentM])-my;
    const dist = Math.hypot(dx, dy);
    if (dist < bestD) { bestD = dist; best = i; }
  });

  const newKey = best >= 0 ? lastPts[best].src + ':' + best : null;
  if (newKey !== hoverKey) { hoverKey = newKey; redraw(); }

  if (best >= 0) {
    const d   = lastPts[best];
    const lbl = SHEETS[d.src].label;
    tip.innerHTML = `<b>${d.bond}</b> <span style="opacity:.6;font-size:10px">${lbl}</span><br>McD: ${d.McD.toFixed(2)}<br>${currentM}: ${d[currentM].toFixed(2)}%`;
    tip.style.cssText = `display:block; left:${e.clientX+14}px; top:${e.clientY-8}px`;
  } else {
    tip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  tip.style.display = 'none'; hoverKey = null; redraw();
});

// ══════════════════════════════════════════════════════
const FWDS_SHEET = {
  id:    '1n9lfE_6kX4lA3cagg1oh4UN4PanASe1XWOYie8qqRZY',
  name:  'matriz_varios',
  range: 'A1:Z50',
};
const FWDS_COLORS = ['#e32d91','#1a4cc8','#7030a0','#1155cc'];

const canvasQ3 = document.getElementById('c3');
const ctxQ3    = canvasQ3.getContext('2d');
let fwdsSections = {};
let currentFwds  = null;
let lastFwdsPts  = [];
let hoverFwdsIdx = -1;

function fetchFwdsSheet() {
  return new Promise((resolve, reject) => {
    const cb = 'fwds_' + Date.now(); let s;
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 12000);
    window[cb] = json => { cleanup(); resolve(json); };
    function cleanup() { clearTimeout(t); delete window[cb]; s && s.parentNode && s.parentNode.removeChild(s); }
    s = document.createElement('script');
    s.src = 'https://docs.google.com/spreadsheets/d/' + FWDS_SHEET.id
      + '/gviz/tq?tqx=responseHandler:' + cb
      + '&sheet=' + encodeURIComponent(FWDS_SHEET.name)
      + '&range=' + encodeURIComponent(FWDS_SHEET.range) + '&headers=0';
    s.onerror = () => { cleanup(); reject(new Error('Error cargando script')); };
    document.head.appendChild(s);
  });
}

function parseFwdsData(rows) {
  const sections = {};
  let current = null;
  rows.forEach(row => {
    const c   = row.c || [];
    const str = i => c[i] && c[i].v != null ? String(c[i].v).trim() : null;
    const num = i => { if (!c[i] || c[i].v == null) return null; const v = +c[i].v; return isFinite(v) ? v : null; };
    const colC = str(2);
    if (colC && colC.toLowerCase().includes('fwds')) {
      current = colC;
      if (!sections[current]) sections[current] = [];
      return;
    }
    if (!current) return;
    const name = colC, x = num(1), y = num(21);
    if (name && x !== null && y !== null) sections[current].push({ name, x, y });
  });
  return sections;
}

async function loadFwds() {
  showFwdsOverlay('loading');
  try {
    const json = await fetchFwdsSheet();
    if (json.status === 'error') throw new Error((json.errors||[]).map(e=>e.message).join('; '));
    fwdsSections = parseFwdsData(json.table.rows);
    const keys = Object.keys(fwdsSections);
    const sel  = document.getElementById('fwdsSelect');
    sel.innerHTML = keys.map(k => `<option value="${k}">${k}</option>`).join('');
    if (!currentFwds || !fwdsSections[currentFwds]) currentFwds = keys[0] || null;
    if (currentFwds) sel.value = currentFwds;
    resizeCanvasQ3(); redrawFwds(); showFwdsOverlay('hidden');
  } catch(e) {
    showFwdsOverlay('error', 'Error cargando Forwards.<br><small>' + e.message + '</small>');
  }
}

function showFwdsOverlay(mode, html) {
  const el = document.getElementById('overlayQ3');

  el.classList.remove('hidden');

    ? '<div class="spinner"></div><div class="overlay-text">Cargando Forwards…</div>'
    : '<div class="error-box">' + html + '</div>';
}

function resizeCanvasQ3() {
  const r = document.getElementById('q3wrap').getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvasQ3.width        = Math.floor(r.width  * dpr);
  canvasQ3.height       = Math.floor(r.height * dpr);
  canvasQ3.style.width  = Math.floor(r.width)  + 'px';
  canvasQ3.style.height = Math.floor(r.height) + 'px';
  ctxQ3.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function switchFwds(val) { currentFwds = val; redrawFwds(); }

function redrawFwds() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvasQ3.width/dpr, H = canvasQ3.height/dpr;
  ctxQ3.clearRect(0,0,W,H); ctxQ3.fillStyle='#000'; ctxQ3.fillRect(0,0,W,H);
  if (!currentFwds || !fwdsSections[currentFwds]) return;

  const pts = fwdsSections[currentFwds]; lastFwdsPts = pts;
  if (!pts.length) { ctxQ3.fillStyle='#444'; ctxQ3.font='12px -apple-system,sans-serif'; ctxQ3.textAlign='center'; ctxQ3.fillText('Sin datos',W/2,H/2); return; }

  const keys  = Object.keys(fwdsSections);
  const color = FWDS_COLORS[keys.indexOf(currentFwds) % FWDS_COLORS.length];
  const xs=pts.map(d=>d.x), ys=pts.map(d=>d.y);
  const xmin=Math.min(...xs), xmax=Math.max(...xs), ymin=Math.min(...ys), ymax=Math.max(...ys);
  const xp=(xmax-xmin)*.10||.05, yp=(ymax-ymin)*.15||.5;
  const xlo=xmin-xp, xhi=xmax+xp, ylo=ymin-yp, yhi=ymax+yp;
  const pW=W-PAD.left-PAD.right, pH=H-PAD.top-PAD.bottom;
  const tx=x=>PAD.left+(x-xlo)/(xhi-xlo)*pW;
  const ty=y=>PAD.top+pH-(y-ylo)/(yhi-ylo)*pH;

  // Grid Y
  const yStep=niceStep(yhi-ylo,5), yStart=Math.ceil(ylo/yStep)*yStep;
  ctxQ3.setLineDash([]); ctxQ3.strokeStyle='#181818'; ctxQ3.lineWidth=1;
  ctxQ3.fillStyle='#666'; ctxQ3.font='10px -apple-system,sans-serif';
  for (let y=yStart; y<=yhi+yStep*.01; y=+(y+yStep).toFixed(10)) {
    const py=ty(y); ctxQ3.beginPath(); ctxQ3.moveTo(PAD.left,py); ctxQ3.lineTo(PAD.left+pW,py); ctxQ3.stroke();
    ctxQ3.textAlign='right'; ctxQ3.fillText((y*100).toFixed(2)+'%', PAD.left-5, py+3.5);
  }
  // Grid X
  const xStep=niceStep(xhi-xlo,6), xStart=Math.ceil(xlo/xStep)*xStep;
  for (let x=xStart; x<=xhi+xStep*.01; x=+(x+xStep).toFixed(10)) {
    const px=tx(x); ctxQ3.beginPath(); ctxQ3.moveTo(px,PAD.top); ctxQ3.lineTo(px,PAD.top+pH); ctxQ3.stroke();
    ctxQ3.textAlign='center'; ctxQ3.fillText(x.toFixed(2), px, PAD.top+pH+15);
  }
  // Axes
  ctxQ3.strokeStyle='#2a2a2a'; ctxQ3.lineWidth=1;
  ctxQ3.beginPath(); ctxQ3.moveTo(PAD.left,PAD.top); ctxQ3.lineTo(PAD.left,PAD.top+pH); ctxQ3.lineTo(PAD.left+pW,PAD.top+pH); ctxQ3.stroke();
  ctxQ3.fillStyle='#666'; ctxQ3.font='11px -apple-system,sans-serif';
  ctxQ3.textAlign='center'; ctxQ3.fillText('Duration (B)', PAD.left+pW/2, H-4);
  ctxQ3.save(); ctxQ3.translate(12,PAD.top+pH/2); ctxQ3.rotate(-Math.PI/2); ctxQ3.fillText('Fwd (%)', 0, 0); ctxQ3.restore();

  // Curve
  if (document.getElementById('chkCurve3').checked && pts.length>=4) {
    const fn=makePolyFit(xs,ys,3), xMin=Math.min(...xs), xMax=Math.max(...xs);
    ctxQ3.beginPath(); let pen=false;
    for (let i=0;i<=400;i++) {
      const x=xMin+(xMax-xMin)*i/400, y=fn(x);
      if (y===null){pen=false;continue;}
      const px=tx(x),py=ty(y);
      if (py<PAD.top-2||py>PAD.top+pH+2){pen=false;continue;}
      pen?ctxQ3.lineTo(px,py):ctxQ3.moveTo(px,py); pen=true;
    }
    ctxQ3.setLineDash([]); ctxQ3.strokeStyle=color; ctxQ3.lineWidth=2; ctxQ3.stroke();
  }

  // Points
  pts.forEach((d,i)=>{
    const px=tx(d.x),py=ty(d.y),hover=i===hoverFwdsIdx;
    ctxQ3.beginPath(); ctxQ3.arc(px,py,hover?7:5,0,Math.PI*2);
    ctxQ3.fillStyle=hover?color:color+'55'; ctxQ3.fill();
    ctxQ3.strokeStyle=color; ctxQ3.lineWidth=hover?2:1.5; ctxQ3.stroke();
  });

  // Labels
  if (document.getElementById('chkLabels3').checked) {
    ctxQ3.font='9px -apple-system,sans-serif'; ctxQ3.fillStyle='#ccc';
    pts.forEach((d,i)=>{ if(i===hoverFwdsIdx)return; ctxQ3.textAlign='left'; ctxQ3.fillText(d.name,tx(d.x)+7,ty(d.y)+3.5); });
  }
}

    const d=lastFwdsPts[best];
    tip.innerHTML=`<b>${d.name}</b><br>B: ${d.x.toFixed(2)}<br>Fwd: ${(d.y*100).toFixed(2)}%`;
    tip.style.cssText=`display:block;left:${e.clientX+14}px;top:${e.clientY-8}px`;
  } else { tip.style.display='none'; }
});
canvasQ3.addEventListener('mouseleave',()=>{ tip.style.display='none'; hoverFwdsIdx=-1; redrawFwds(); });

new ResizeObserver(()=>{ if(Object.keys(fwdsSections).length){resizeCanvasQ3();redrawFwds();} })
  .observe(document.getElementById('q3wrap'));

// ── Auto-refresh cada 3 minutos ────────────────────────
const AUTO_INTERVAL = 3 * 60 * 1000;
let countdown = AUTO_INTERVAL / 1000;

setInterval(() => { loadData(); loadFwds(); }, AUTO_INTERVAL);

setInterval(() => {
  countdown--;
  if (countdown <= 0) countdown = AUTO_INTERVAL / 1000;
  const m = Math.floor(countdown / 60);
  const s = String(countdown % 60).padStart(2, '0');
  const el = document.getElementById('autoRefreshTimer');
  if (el) el.textContent = `↺ ${m}:${s}`;
}, 1000);

// ── Init ───────────────────────────────────────────────
loadData();
loadFwds();
</script>
</body>
</html>
